<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentile Rank</title>
    <link rel="icon" href="/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white max-w-lg w-full rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center items-center">
            <h1 class="text-2xl font-bold inline-block align-middle">
                Compute Percentile Rank
            </h1>
        </div>

        <div class="p-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Target List (genus.txt, species.txt)</label>
                    <input type="file" id="targetFile" accept=".txt" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Reference Database (rel-*-table.tsv)</label>
                    <input type="file" id="refFile" accept=".tsv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Input Data (rel-*-table.tsv)</label>
                    <input type="file" id="dataFile" accept=".tsv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors">
                </div>
            </div>

            <p id="status-msg" class="text-sm text-red-500 hidden"></p>

            <div class="flex gap-4">
                <button id="process-btn" py-click="process_files" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 inline-block align-middle">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.448 14.9 14.9 0 0 1 .06-.312m-2.24 2.39a4.493 4.493 0 0 0-1.757 4.306 4.493 4.493 0 0 0 4.306-1.758M16.5 9a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z" />
                    </svg>
                    Process
                </button>
                <button id="reset-btn" py-click="reset_page" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl transition-all">
                     <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 inline-block align-middle">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    Clear
                </button>
            </div>

            <div id="preview-container" class="mt-6 hidden">
                <h3 class="text-lg font-semibold mb-2">Data Preview (First 5 Rows)</h3>
                <div id="preview-table" class="overflow-x-auto bg-slate-50 p-4 rounded-lg border">
                    </div>
            </div>

            <div id="download-container" class="hidden mt-4 text-center">
                <a id="download-link" href="#" class="inline-flex items-center justify-center w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 inline-block align-middle">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    <p> Download Result</p>
                </a>
            </div>
        </div>
    </div>

    
    <script type="py" src="./main.py" config='{"packages": ["numpy", "pandas", "scipy"]}'></script>

</body>
</html>
